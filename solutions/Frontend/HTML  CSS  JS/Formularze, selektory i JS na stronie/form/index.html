<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Leader's Website - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a class="navLink" href="javascript:void(0);">
            <img id="navLogo" src="/assets/materialy/great_leader-01.jpg" alt="Great Leader Logo">
        </a>
        <a class="navLink" href="javascript:void(0);">Main</a>
        <a class="navLink" href="javascript:void(0);">Blog</a>
        <a class="navLink" href="javascript:void(0);">Contact Us</a>
    </nav>

    <div id="mainDiv">
        <div class="contentColumn">
            <img id="greatLeaderPhoto" src="/assets/materialy/great_leader-01.jpg" alt="The Great Leader">
        </div>
        <div class="contentColumn">
            <h1>Register now!</h1>
            <div id="registerPanel">
                <h3>Join the Great Leader!</h3>

                <!-- Formularz rejestracji -->
                <form id="registerForm" action="#" method="post">
                    <label for="email">Password:</label>
                    <input type="text" id="email" name="email">

                    <label for="password">Password:</label>
                    <input type="text" id="password" name="password">

                    <label for="confirmPassword">Password:</label>
                    <input type="text" id="confirmPassword" name="confirmPassword">

                    
                </form>
            </div>
        </div>
    </div>
</body>
</html>
